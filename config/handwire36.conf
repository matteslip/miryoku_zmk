# Shared Kconfig for handwire36 (both halves)

# Enable ZMK split keyboard support
CONFIG_ZMK_SPLIT=y

# Enable BLE split (nice!nano)
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_BT=y

# Free NFC pins (P0.09, P0.10) for GPIO
CONFIG_NFCT_PINS_AS_GPIOS=y

# Optional: enable USB for the central half (left)
# CONFIG_ZMK_USB=y
