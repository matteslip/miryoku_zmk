# Shared Kconfig for handwire36 (both halves)

# Enable ZMK split keyboard support
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_KSCAN=y

# Enable BLE split (nice!nano)
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_BT=y

# Free NFC pins (P0.09, P0.10) for GPIO
CONFIG_NFCT_PINS_AS_GPIOS=y

# Enable USB HID output
CONFIG_ZMK_USB=y

# Disable battery reporting — frees P0.02 for kscan GPIO
CONFIG_ZMK_BATTERY_REPORTING=n
